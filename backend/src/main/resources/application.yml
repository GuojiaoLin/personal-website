spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
  application:
    name: personal-website-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/personal_website}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  flyway:
    enabled: true

server:
  port: ${SERVER_PORT:18081}
  servlet:
    session:
      cookie:
        http-only: true
        same-site: lax
        secure: ${SESSION_COOKIE_SECURE:true}

site:
  admin:
    email: ${SITE_ADMIN_EMAIL:}
    password: ${SITE_ADMIN_PASSWORD:}
  cors:
    allowed-origins: ${SITE_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  uploads:
    directory: ${SITE_UPLOADS_DIRECTORY:uploads}
    public-path: ${SITE_UPLOADS_PUBLIC_PATH:/uploads}
  content:
    seed:
      enabled: ${SITE_CONTENT_SEED_ENABLED:true}
      blog-directory: ${SITE_CONTENT_SEED_BLOG_DIRECTORY:../src/content/blog}
  gallery:
    seed:
      enabled: ${SITE_GALLERY_SEED_ENABLED:true}
      source-directory: ${SITE_GALLERY_SEED_SOURCE_DIRECTORY:../docs/images/图册}
