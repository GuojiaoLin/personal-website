# Prefer the root docker-compose.yml.
# If you run this file directly, use: docker compose --env-file ../.env up -d
services:
  postgres:
    image: postgres:16
    container_name: personal-website-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-personal_website}
      POSTGRES_USER: ${DATABASE_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?Set DATABASE_PASSWORD in root .env or pass --env-file ../.env}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
